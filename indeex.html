            }
        }

        // ================================================================
        // 小纸条博物馆模块（使用 noteMeta 管理时期和分类）
        // ================================================================
        let noteState = {
            selectedPeriod: null,
            selectedCategory: null,
            checkedIds: new Set(),
            displayMode: 'wall',
            editingId: null
        };

        function renderNoteMuseum() {
            const container = document.getElementById('note-display-container');
            if (!container) return;
            // 时期标签
            const periods = noteMeta.periods || [];
            const periodContainer = document.getElementById('period-tabs');
            if (periodContainer) {
                let html =
                    `<span class="period-tab ${!noteState.selectedPeriod ? 'active' : ''}" data-period="">全部</span>`;
                periods.forEach(p => {
                    const active = p === noteState.selectedPeriod ? 'active' : '';
                    html += `<span class="period-tab ${active}" data-period="${p}">${p}</span>`;
                });
                periodContainer.innerHTML = html;
                periodContainer.querySelectorAll('.period-tab').forEach(el => {
                    el.addEventListener('click', function() {
                        noteState.selectedPeriod = this.dataset.period || null;
                        noteState.selectedCategory = null;
                        renderNoteMuseum();
                    });
                });
            }
            // 分类行
            const categoryContainer = document.getElementById('category-row');
            if (categoryContainer) {
                let cats = [];
                if (noteState.selectedPeriod && noteMeta.categories[noteState.selectedPeriod]) {
                    cats = noteMeta.categories[noteState.selectedPeriod];
                } else {
                    // 汇总所有分类
                    const catSet = new Set();
                    Object.values(noteMeta.categories).forEach(arr => arr.forEach(c => catSet.add(c)));
                    cats = Array.from(catSet);
                }
                let html =
                    `<button class="cat-btn ${!noteState.selectedCategory ? 'active' : ''}" data-cat="">全部</button>`;
                html +=
                    `<button class="cat-btn ${noteState.selectedCategory === '__uncat__' ? 'active' : ''}" data-cat="__uncat__">未分类</button>`;
                cats.forEach(c => {
                    const active = c === noteState.selectedCategory ? 'active' : '';
                    html += `<button class="cat-btn ${active}" data-cat="${c}">${c}</button>`;
                });
                html += `<button class="cat-btn add-cat-btn" id="quick-add-cat">+ 添加分类</button>`;
                categoryContainer.innerHTML = html;
                categoryContainer.querySelectorAll('.cat-btn[data-cat]').forEach(el => {
                    el.addEventListener('click', function() {
                        const cat = this.dataset.cat || null;
                        noteState.selectedCategory = cat === '__uncat__' ? '__uncat__' : cat;
                        renderNoteMuseum();
                    });
                });
                const quickAdd = categoryContainer.querySelector('#quick-add-cat');
                if (quickAdd) {
                    quickAdd.addEventListener('click', function() {
                        const period = noteState.selectedPeriod || (noteMeta.periods.length ? noteMeta.periods[0] :
                            '');
                        if (!period) { alert('请先创建时期（在“管理分类”中）'); return; }
                        const name = prompt('输入新分类名称：');
                        if (name && name.trim()) {
                            // 添加分类到元数据
                            if (!noteMeta.categories[period]) noteMeta.categories[period] = [];
                            if (!noteMeta.categories[period].includes(name.trim())) {
                                noteMeta.categories[period].push(name.trim());
                                saveNotes(); // 保存元数据
                                renderNoteMuseum();
                            } else {
                                alert('分类已存在');
                            }
                        }
                    });
                }
            }
            // 过滤
            let notes = allNotes;
            if (noteState.selectedPeriod) {
                notes = notes.filter(n => n.period === noteState.selectedPeriod);
            }
            if (noteState.selectedCategory === '__uncat__') {
                notes = notes.filter(n => !n.category || n.category === '');
            } else if (noteState.selectedCategory) {
                notes = notes.filter(n => n.category === noteState.selectedCategory);
            }
            // 渲染
            if (!notes.length) {
                container.innerHTML =
                    `<div class="empty-state"><span class="big-icon">· · ·</span>还没有纸条，添加一张吧</div>`;
                return;
            }
            if (noteState.displayMode === 'wall') {
                let html = '<div class="note-wall">';
                const shuffled = [...notes];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                shuffled.forEach(n => {
                    const checked = noteState.checkedIds.has(n.id) ? 'checked' : '';
                    const rot = (Math.random() - 0.5) * 3;
                    html += `
                        <div class="note-card" style="transform: rotate(${rot}deg);" data-id="${n.id}">
                            <img src="${n.image}" alt="纸条" loading="lazy">
                            <div class="note-remark">${n.remark || ''}</div>
                            <div class="note-check ${checked}" data-id="${n.id}">✓</div>
                            <div class="note-actions">
                                <button class="edit-note-btn" onclick="event.stopPropagation(); openNoteForm('${n.id}')">编辑</button>
                                <button class="del-note-btn" onclick="event.stopPropagation(); confirmDeleteNote('${n.id}')">删除</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
                container.querySelectorAll('.note-check').forEach(el => {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        if (noteState.checkedIds.has(id)) noteState.checkedIds.delete(id);
                        else noteState.checkedIds.add(id);
                        renderNoteMuseum();
                    });
                });
                container.querySelectorAll('.note-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        if (e.target.closest('.note-check') || e.target.closest('.note-actions'))
                            return;
                        const id = this.dataset.id;
                        const note = allNotes.find(n => n.id === id);
                        if (note) {
                            const w = window.open('', '_blank');
                            if (w) {
                                w.document.write(
                                    `<img src="${note.image}" style="max-width:100%;max-height:100vh;display:block;margin:auto;background:#f0ebe3;">`
                                    );
                                w.document.title = '纸条预览';
                            }
                        }
                    });
                });
            } else {
                let html = '<div class="note-list">';
                notes.forEach(n => {
                    const checked = noteState.checkedIds.has(n.id) ? 'checked' : '';
                    html += `
                        <div class="note-list-item" data-id="${n.id}">
                            <img src="${n.image}" alt="纸条">
                            <div class="note-info">
                                <div class="note-remark-text">${n.remark || ''}</div>
                                <div class="note-meta">${n.period || '无时期'} · ${n.category || '未分类'}</div>
                            </div>
                            <div class="note-check-list ${checked}" data-id="${n.id}">✓</div>
                            <div class="note-actions-list">
                                <button class="edit-note-btn" onclick="openNoteForm('${n.id}')">编辑</button>
                                <button class="del-note-btn" onclick="confirmDeleteNote('${n.id}')">删除</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
                container.querySelectorAll('.note-check-list').forEach(el => {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        if (noteState.checkedIds.has(id)) noteState.checkedIds.delete(id);
                        else noteState.checkedIds.add(id);
                        renderNoteMuseum();
                    });
                });
            }
            // 批量操作条
            const bar = document.getElementById('batch-bar');
            const count = document.getElementById('batch-count');
            const total = noteState.checkedIds.size;
            count.textContent = `已选 ${total} 张`;
            if (total > 0) bar.classList.add('show');
            else bar.classList.remove('show');
            const sel = document.getElementById('batch-category');
            let cats = [];
            if (noteState.selectedPeriod && noteMeta.categories[noteState.selectedPeriod]) {
                cats = noteMeta.categories[noteState.selectedPeriod];
            } else {
                const catSet = new Set();
                Object.values(noteMeta.categories).forEach(arr => arr.forEach(c => catSet.add(c)));
                cats = Array.from(catSet);
            }
            sel.innerHTML = '<option value="">移动至分类...</option>';
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
            });
        }

        function updateNoteCount() {
            document.getElementById('note-count').textContent = allNotes.length + ' 张';
        }

        // ---------- 删除纸条 ----------
        function confirmDeleteNote(noteId) {
            if (!confirm('确定删除这张纸条吗？')) return;
            allNotes = allNotes.filter(n => n.id !== noteId);
            if (noteState.checkedIds.has(noteId)) noteState.checkedIds.delete(noteId);
            saveNotes().then(() => {
                renderNoteMuseum();
            });
        }

        // ---------- 纸条添加/编辑 ----------
        function openNoteForm(noteId) {
            let form = document.getElementById('note-form');
            if (!form) {
                const modal = document.getElementById('note-modal');
                if (modal) form = modal.querySelector('form');
                if (!form) {
                    alert('页面错误：找不到纸条表单，请刷新页面后重试。');
                    return;
                }
            }

            const title = document.getElementById('note-modal-title');
            const delBtn = document.getElementById('note-delete-btn');
            const preview = document.getElementById('note-preview');
            const remark = document.getElementById('note-remark');
            const periodSel = document.getElementById('note-period');
            const catSel = document.getElementById('note-category');

            form.reset();
            preview.innerHTML = '';
            delBtn.style.display = 'none';
            noteState.editingId = null;

            // 填充时期选项（来自 noteMeta）
            periodSel.innerHTML = '<option value="">未分类时期</option>';
            noteMeta.periods.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                periodSel.appendChild(opt);
            });

            function updateCats(period) {
                catSel.innerHTML = '<option value="">未分类</option>';
                const cats = noteMeta.categories[period] || [];
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    catSel.appendChild(opt);
                });
            }
            periodSel.addEventListener('change', function() { updateCats(this.value); });

            if (noteId) {
                const note = allNotes.find(n => n.id === noteId);
                if (!note) return;
                noteState.editingId = noteId;
                title.textContent = '编辑纸条';
                delBtn.style.display = 'inline-block';
                remark.value = note.remark || '';
                if (note.image) {
                    const item = document.createElement('div');
                    item.className = 'image-preview-item';
                    item.innerHTML =
                        `<img src="${note.image}"><button type="button" class="remove-image-btn" onclick="this.parentElement.remove()">×</button>`;
                    preview.appendChild(item);
                }
                if (note.period) {
                    periodSel.value = note.period;
                    updateCats(note.period);
                    if (note.category) catSel.value = note.category;
                }
            } else {
                title.textContent = '添加纸条';
                if (noteState.selectedPeriod) {
                    periodSel.value = noteState.selectedPeriod;
                    updateCats(noteState.selectedPeriod);
                    if (noteState.selectedCategory && noteState.selectedCategory !== '__uncat__') {
                        catSel.value = noteState.selectedCategory;
                    }
                }
            }

            form.onsubmit = function(e) {
                e.preventDefault();
                saveNoteForm();
            };
            document.getElementById('note-modal').classList.add('active');
        }

        function saveNoteForm() {
            const preview = document.getElementById('note-preview');
            const imgEl = preview.querySelector('img');
            const image = imgEl ? imgEl.src : '';
            const remark = document.getElementById('note-remark').value.trim();
            const period = document.getElementById('note-period').value;
            const category = document.getElementById('note-category').value;
            if (!image) { alert('请上传图片'); return; }

            if (noteState.editingId) {
                const note = allNotes.find(n => n.id === noteState.editingId);
                if (note) {
                    note.image = image;
                    note.remark = remark;
                    note.period = period;
                    note.category = category;
                }
            } else {
                const newNote = {
                    id: 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    image,
                    remark,
                    period,
                    category
                };
                allNotes.push(newNote);
            }
            // 保存后，可能新增了时期/分类，需要更新 noteMeta
            // 从所有笔记中重新提取，确保元数据最新
            refreshMetaFromNotes();
            saveNotes().then(() => {
                closeModal('note-modal');
                renderNoteMuseum();
            });
        }

        // 从所有笔记中提取时期和分类，更新 noteMeta（用于新增纸条后）
        function refreshMetaFromNotes() {
            const periods = new Set();
            const categories = {};
            allNotes.forEach(n => {
                if (n.period) periods.add(n.period);
                if (n.period && n.category) {
                    if (!categories[n.period]) categories[n.period] = new Set();
                    categories[n.period].add(n.category);
                }
            });
            noteMeta.periods = Array.from(periods);
            noteMeta.categories = {};
            Object.keys(categories).forEach(p => {
                noteMeta.categories[p] = Array.from(categories[p]);
            });
        }

        function deleteNote() {
            if (!noteState.editingId) return;
            if (!confirm('确定删除这张纸条吗？')) return;
            const id = noteState.editingId;
            allNotes = allNotes.filter(n => n.id !== id);
            if (noteState.checkedIds.has(id)) noteState.checkedIds.delete(id);
            refreshMetaFromNotes();
            saveNotes().then(() => {
                closeModal('note-modal');
                renderNoteMuseum();
            });
        }

        // ---------- 分类管理（真实保存） ----------
        function openCategoryManager() {
            const modal = document.getElementById('category-modal');
            if (!modal) return;
            // 时期列表
            const periodList = document.getElementById('period-list');
            periodList.innerHTML = '';
            noteMeta.periods.forEach(p => {
                const div = document.createElement('div');
                div.className = 'category-manage-item';
                div.innerHTML = `
                    <span class="cat-name">${p}</span>
                    <div class="cat-actions">
                        <button onclick="renamePeriod('${p}')">✎</button>
                        <button onclick="deletePeriod('${p}')">✕</button>
                    </div>
                `;
                periodList.appendChild(div);
            });
            // 分类列表（按时期分组）
            const catList = document.getElementById('category-list');
            catList.innerHTML = '';
            noteMeta.periods.forEach(p => {
                const cats = noteMeta.categories[p] || [];
                if (cats.length) {
                    const header = document.createElement('div');
                    header.style.fontWeight = 'bold';
                    header.style.marginTop = '8px';
                    header.textContent = p;
                    catList.appendChild(header);
                    cats.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'category-manage-item';
                        div.innerHTML = `
                            <span class="cat-name">${c}</span>
                            <div class="cat-actions">
                                <button onclick="renameCategory('${p}','${c}')">✎</button>
                                <button onclick="deleteCategory('${p}','${c}')">✕</button>
                            </div>
                        `;
                        catList.appendChild(div);
                    });
                }
            });
            // 填充新分类的时期下拉
            const periodSelect = document.getElementById('new-category-period');
            periodSelect.innerHTML = '<option value="">选择时期</option>';
            noteMeta.periods.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                periodSelect.appendChild(opt);
            });
            modal.classList.add('active');
        }

        // 添加时期
        window.addPeriod = function() {
            const input = document.getElementById('new-period-input');
            const name = input.value.trim();
            if (!name) { alert('请输入时期名称'); return; }
            if (noteMeta.periods.includes(name)) { alert('时期已存在'); return; }
            noteMeta.periods.push(name);
            noteMeta.categories[name] = [];
            saveNotes().then(() => {
                input.value = '';
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // 重命名时期
        window.renamePeriod = function(oldName) {
            const newName = prompt('重命名时期：', oldName);
            if (!newName || newName === oldName) return;
            if (noteMeta.periods.includes(newName)) { alert('名称已存在'); return; }
            const idx = noteMeta.periods.indexOf(oldName);
            if (idx === -1) return;
            noteMeta.periods[idx] = newName;
            noteMeta.categories[newName] = noteMeta.categories[oldName] || [];
            delete noteMeta.categories[oldName];
            // 更新所有笔记中的时期
            allNotes.forEach(n => { if (n.period === oldName) n.period = newName; });
            saveNotes().then(() => {
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // 删除时期
        window.deletePeriod = function(name) {
            if (!confirm(`确定删除时期“${name}”吗？相关笔记的时期将被置空。`)) return;
            noteMeta.periods = noteMeta.periods.filter(p => p !== name);
            delete noteMeta.categories[name];
            allNotes.forEach(n => { if (n.period === name) n.period = ''; });
            saveNotes().then(() => {
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // 添加分类
        window.addCategory = function() {
            const period = document.getElementById('new-category-period').value;
            const name = document.getElementById('new-category-input').value.trim();
            if (!period) { alert('请选择时期'); return; }
            if (!name) { alert('请输入分类名称'); return; }
            if (!noteMeta.categories[period]) noteMeta.categories[period] = [];
            if (noteMeta.categories[period].includes(name)) { alert('分类已存在'); return; }
            noteMeta.categories[period].push(name);
            saveNotes().then(() => {
                document.getElementById('new-category-input').value = '';
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // 重命名分类
        window.renameCategory = function(period, oldName) {
            const newName = prompt('重命名分类：', oldName);
            if (!newName || newName === oldName) return;
            const cats = noteMeta.categories[period] || [];
            if (cats.includes(newName)) { alert('名称已存在'); return; }
            const idx = cats.indexOf(oldName);
            if (idx === -1) return;
            cats[idx] = newName;
            // 更新笔记中的分类
            allNotes.forEach(n => { if (n.period === period && n.category === oldName) n.category = newName; });
            saveNotes().then(() => {
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // 删除分类
        window.deleteCategory = function(period, name) {
            if (!confirm(`确定删除分类“${name}”吗？相关笔记的分类将被置空。`)) return;
            const cats = noteMeta.categories[period] || [];
            noteMeta.categories[period] = cats.filter(c => c !== name);
            allNotes.forEach(n => { if (n.period === period && n.category === name) n.category = ''; });
            saveNotes().then(() => {
                openCategoryManager();
                renderNoteMuseum();
            });
        };

        // ---------- 批量操作 ----------
        function batchMoveCategory() {
            const sel = document.getElementById('batch-category');
            const target = sel.value;
            if (!target) { alert('请选择目标分类'); return; }
            const ids = Array.from(noteState.checkedIds);
            if (!ids.length) return;
            const period = noteState.selectedPeriod || '';
            ids.forEach(id => {
                const note = allNotes.find(n => n.id === id);
                if (note) {
                    note.category = target;
                    if (period && note.period !== period) note.period = period;
                }
            });
            refreshMetaFromNotes();
            saveNotes().then(() => {
                noteState.checkedIds.clear();
                renderNoteMuseum();
            });
        }

        function batchShare() {
            const ids = Array.from(noteState.checkedIds);
            if (!ids.length) { alert('请先勾选纸条'); return; }
            const notes = ids.map(id => allNotes.find(n => n.id === id)).filter(n => n);
            if (!notes.length) return;

            const el = document.createElement('div');
            el.className = 'share-container-wide';
            let html = `<h2>小纸条博物馆 · 精选</h2><div class="share-wall">`;
            notes.forEach(n => {
                const rot = (Math.random() - 0.5) * 4;
                html += `
                    <div class="share-item" style="transform:rotate(${rot}deg);">
                        <img src="${n.image}" alt="纸条">
                        ${n.remark ? `<div class="share-remark">${n.remark}</div>` : ''}
                    </div>
                `;
            });
            html += `</div><div class="share-footer">—— 来自「小纸条博物馆」</div>`;
            el.innerHTML = html;

            const shareModal = document.getElementById('share-modal');
            const shareContent = document.getElementById('share-content');
            shareContent.innerHTML = '';
            shareContent.appendChild(el);
            shareModal.classList.add('active');

            const confirmBtn = document.getElementById('confirm-share-btn');
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
            newBtn.onclick = function() {
                captureAndDownload(el, '小纸条精选.png');
                closeModal('share-modal');
                noteState.checkedIds.clear();
                renderNoteMuseum();
            };
        }

        // ---------- 导出/导入纸条 ----------
        function exportNotes() {
            const blob = new Blob([JSON.stringify(allNotes, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'notes_backup.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importNotes() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (Array.isArray(data) && data.every(n => n.id && n.image)) {
                            if (confirm(`将导入 ${data.length} 张纸条，覆盖当前数据？`)) {
                                allNotes = data;
                                refreshMetaFromNotes();
                                saveNotes().then(() => {
                                    renderNoteMuseum();
                                    alert('导入成功！');
                                });
                            }
                        } else {
                            alert('文件格式无效');
                        }
                    } catch (err) { alert('文件解析失败'); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ---------- 截图工具 ----------
        function captureAndDownload(element, filename) {
            html2canvas(element, { scale: 1.8, backgroundColor: '#fffaf0', useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.download = filename;
                a.href = canvas.toDataURL();
                a.click();
            }).catch(err => alert('截图失败: ' + err));
        }

        // ---------- 模态框工具 ----------
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ---------- 文件上传（小纸条） ----------
        function setupNoteUpload() {
            const area = document.getElementById('note-upload-area');
            const input = document.getElementById('note-file-input');
            const preview = document.getElementById('note-preview');
            if (!area || !input) return;
            area.addEventListener('click', () => input.click());
            area.addEventListener('dragover', (e) => { e.preventDefault();
                area.classList.add('drag-over'); });
            area.addEventListener('dragleave', () => { area.classList.remove('drag-over'); });
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drag-over');
                if (e.dataTransfer.files.length) handleNoteFile(e.dataTransfer.files[0]);
            });
            input.addEventListener('change', function() {
                if (this.files.length) handleNoteFile(this.files[0]);
                this.value = '';
            });

            function handleNoteFile(file) {
                if (!file.type.startsWith('image/')) { alert('请上传图片'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.innerHTML =
                        `<div class="image-preview-item"><img src="${ev.target.result}"><button type="button" class="remove-image-btn" onclick="this.parentElement.remove()">×</button></div>`;
                };
                reader.readAsDataURL(file);
            }
        }

        // ---------- Tab 切换 ----------
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                });
            });
        }

        // ---------- 初始化 ----------
        document.addEventListener('DOMContentLoaded', function() {
            initTabs();
            setupNoteUpload();

            document.getElementById('add-book-btn').addEventListener('click', () => openBookForm(null));
            document.getElementById('import-books-btn').addEventListener('click', importBooks);

            document.getElementById('add-note-btn').addEventListener('click', () => openNoteForm(null));
            document.getElementById('note-mode-wall').addEventListener('click', function() {
                noteState.displayMode = 'wall';
                document.getElementById('note-mode-wall').classList.add('active-mode');
                document.getElementById('note-mode-list').classList.remove('active-mode');
                renderNoteMuseum();
            });
            document.getElementById('note-mode-list').addEventListener('click', function() {
                noteState.displayMode = 'list';
                document.getElementById('note-mode-list').classList.add('active-mode');
                document.getElementById('note-mode-wall').classList.remove('active-mode');
                renderNoteMuseum();
            });
            document.getElementById('manage-category-btn').addEventListener('click', openCategoryManager);
            document.getElementById('batch-move').addEventListener('click', batchMoveCategory);
            document.getElementById('batch-share').addEventListener('click', batchShare);
            document.getElementById('batch-clear').addEventListener('click', function() {
                noteState.checkedIds.clear();
                renderNoteMuseum();
            });
            document.getElementById('export-notes-btn').addEventListener('click', exportNotes);
            document.getElementById('import-notes-btn').addEventListener('click', importNotes);

            loadAllData();
        });

        // 暴露全局函数
        window.openBookForm = openBookForm;
        window.openPageForm = openPageForm;
        window.confirmDeleteBook = confirmDeleteBook;
        window.deleteBook = deleteBook;
        window.confirmDeletePage = confirmDeletePage;
        window.deletePage = deletePage;
        window.openReader = openReader;
        window.readerPrev = readerPrev;
        window.readerNext = readerNext;
        window.readerJump = readerJump;
        window.readerEditBook = readerEditBook;
        window.openNoteForm = openNoteForm;
        window.deleteNote = deleteNote;
        window.confirmDeleteNote = confirmDeleteNote;
        window.openCategoryManager = openCategoryManager;
        window.addPeriod = addPeriod;
        window.renamePeriod = renamePeriod;
        window.deletePeriod = deletePeriod;
        window.addCategory = addCategory;
        window.renameCategory = renameCategory;
        window.deleteCategory = deleteCategory;
        window.closeModal = closeModal;
        window.removeBookCover = removeBookCover;
        window.addPageImagePreview = addPageImagePreview;
        window.downloadBook = downloadBook;
        window.importBooks = importBooks;
    </script>

</body>
</html>
